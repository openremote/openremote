buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath "cz.habarta.typescript-generator:typescript-generator-gradle-plugin:$typescriptGeneratorVersion"
    }
}

plugins {
    id 'groovy'
    id 'cz.habarta.typescript-generator'
}

dependencies {
    compileOnly project(":model-util")
    implementation project(":model")
    implementation project(":agent")
    implementation libs.jacksonDatatypeJdk8
    implementation libs.jacksonDatatypeJsr310
    implementation libs.jacksonModuleParameterNames
    implementation libs.typescriptGeneratorCore
}

generateTypeScript createTSGeneratorConfigForModel("src/model.ts")

def generateTypeScriptTask = tasks.named("generateTypeScript")

tasks.register('npmBuild', Exec) {
    mustRunAfter npmClean
    dependsOn getYarnInstallTask()
    commandLine npmCommand("yarn"), "run", "build"
}

tasks.named("build") {
    dependsOn generateTypeScriptTask, tasks.named("npmBuild")
}

tasks.named("npmBuild") {
    dependsOn generateTypeScriptTask
}

clean {
    doLast {
        delete "dist"
        delete "lib"
    }
}

tasks.register('prepareUi') {
    dependsOn clean, npmPrepare
}

tasks.register('publishUi') {
    dependsOn clean, npmPublish
}

gradle.startParameter.excludedTaskNames += ["${project.path}:test".toString()]
