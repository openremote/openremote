buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath "cz.habarta.typescript-generator:typescript-generator-gradle-plugin:$typescriptGeneratorVersion"
    }
}

plugins {
    id 'groovy'
    id 'cz.habarta.typescript-generator'
}

dependencies {
    // TODO: Remove this as shouldn't build custom project code into this package
    def customModel = findProject(":model")
    if (customModel != null) {
        implementation customModel
    }
    compileOnly project(":model-util")
    implementation project(":model")
    implementation libs.typescriptGeneratorCore
    implementation libs.jacksonDatatypeJdk8
    implementation libs.jacksonDatatypeJsr310
    implementation libs.jacksonModuleParameterNames
}

//project.task(Collections.singletonMap(Task.TASK_TYPE, cz.habarta.typescript.generator.gradle.GenerateTask), "generateTypescriptModelInfo")
//generateTypescriptModelInfo createTSGeneratorConfigForModel("$buildDir/model.ts")

generateTypeScript createTSGeneratorConfigForClient(
    "src/restclient.ts",
    new File("${project(":ui:component:model").projectDir}/src/typescript-generator-info.json")
)

def generateTypeScriptTask = tasks.named("generateTypeScript")
generateTypeScriptTask.configure {
    dependsOn resolveTask(":ui:component:model:generateTypeScript")
}

clean {
    doLast {
        def dir = new File("${projectDir}/dist")
        dir.deleteDir()
        def libs = new File("${projectDir}/lib")
        libs.deleteDir()
    }
}

tasks.register('npmBuild', Exec) {
    mustRunAfter npmClean
    dependsOn getYarnInstallTask()
    commandLine npmCommand("yarn"), "run", "build"
}

tasks.named("build") {
    dependsOn generateTypeScriptTask, tasks.named("npmBuild")
}

tasks.named("npmBuild") {
    dependsOn generateTypeScriptTask
}

tasks.register('prepareUi') {
    dependsOn clean, build, npmPrepare
}

tasks.register('publishUi') {
    dependsOn clean, build, npmPublish
}

gradle.startParameter.excludedTaskNames += ["${project.path}:test".toString()]
