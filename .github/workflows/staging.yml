name: Staging

on:
  push:
    branches: [master]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      ENVIRONMENT:
        description: 'Environment to use (if any)'
      MANAGER_TAG:
        description: 'Manager docker tag to pull'
      CLEAN_INSTALL:
        description: 'Delete data before starting'
        type: boolean
      COMMIT:
        description: 'Repo branch or commit SHA to checkout'
      OR_HOSTNAME:
        description: 'Host to deploy to (e.g. demo.openremote.app)'
      OR_ADMIN_PASSWORD:
        description: 'Admin password override'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect whether code changed
    runs-on: ubuntu-latest
    outputs:
      # Code changes
      # See https://github.com/tj-actions/changed-files/tree/2bb135777322059ee3a3c9239999b159ff49febc#outputs-
      any_modified: ${{ steps.changed-files.outputs.backend_any_modified == 'true' || steps.changed-files.outputs.ui_any_modified == 'true' }}
      backend_any_modified: ${{ steps.changed-files.outputs.backend_any_modified }}
      ui_any_modified: ${{ steps.changed-files.outputs.ui_any_modified }}
      # Version details
      version: ${{ steps.get-version-details.outputs.version }}
      version_with_qualifier: ${{ steps.get-version-details.outputs.version_with_qualifier }}
      is_release: ${{ steps.get-version-details.outputs.is_release }}
      # Processed ci_cd.json outputs
      dockerTags: ${{ steps.ci-cd-output.outputs.dockerTags }}
      npmTag: ${{ steps.ci-cd-output.outputs.npmTag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2 # Must be 2 for push events to compare to previous commit

      - name: Detect changes
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_yaml: |
            ui:
              - '.yarn'
              - 'ui/**'
              - '!**/*.md'
              - '!**/*.yml'
              - '.yarnrc.yml'
              - 'package.json'
              - 'yarn.lock'
            backend:
              - '!.ci_cd/**'
              - '!.yarn'
              - '!deployment/**'
              - '!ui/**'
              - '!**/*.md'
              - '!**/*.yml'
              - '!.yarnrc.yml'
              - '!package.json'
              - '!yarn.lock'

      - name: Get version details
        id: get-version-details
        uses: openremote/openremote/.github/actions/get-version-details@fa6f52032b1dea3d4ad080cc6436a3ef3843b0be

      - name: Check if main repo
        id: is_main_repo
        uses: openremote/openremote/.github/actions/check-if-main-repo@fa6f52032b1dea3d4ad080cc6436a3ef3843b0be

      - name: Process ci_cd.json file
        id: ci-cd-output
        uses: openremote/openremote/.github/actions/process-cicd-json@e9e87797bed31cdf6c2de6ec30fd6a05753f35f4
        with:
          IS_MAIN_REPO: ${{ steps.is_main_repo.outputs.value }} # Shouldn't be needed in this context
          MANAGER_VERSION: ${{ steps.is_main_repo.outputs.version }}
          IS_RELEASE: ${{ steps.get-version-details.outputs.is_release }}
          VERSION: ${{ steps.get-version-details.outputs.version }}

  ui-check-dependencies:
    name: Lint
    needs: detect-changes
    if: ${{ !failure() && !cancelled() }}
    uses: "./.github/workflows/ui-check-dependencies.yml"
    with:
      skip: ${{ needs.detect-changes.outputs.ui_any_modified != 'true' }}

  ui-check-outdated-translations:
    name: Lint
    needs: detect-changes
    if: ${{ !failure() && !cancelled() }}
    uses: "./.github/workflows/ui-check-outdated-translations.yml"
    with:
      skip: ${{ needs.detect-changes.outputs.backend_any_modified != 'true' }}

  install-browsers:
    name: Build
    needs: detect-changes
    if: ${{ !failure() && !cancelled() }}
    uses: "./.github/workflows/install-browsers.yml"
    with:
      skip: ${{ needs.detect-changes.outputs.any_modified != 'true' }}

  install-dist:
    name: Build
    needs: detect-changes
    uses: "./.github/workflows/install-dist.yml"
    with:
      VERSION_WITH_QUALIFIER: ${{ needs.detect-changes.outputs.version_with_qualifier }}

  unit-tests:
    name: Test
    needs: detect-changes
    if: ${{ !failure() && !cancelled() }}
    uses: "./.github/workflows/unit-tests.yml"
    with:
      skip: ${{ needs.detect-changes.outputs.backend_any_modified != 'true' }}

  integration-tests:
    name: Test
    needs: detect-changes
    if: ${{ !failure() && !cancelled() }}
    uses: "./.github/workflows/integration-tests.yml"
    with:
      skip: ${{ needs.detect-changes.outputs.backend_any_modified != 'true' }}

  code-coverage:
    name: Test
    needs: [detect-changes, unit-tests, integration-tests]
    if: ${{ !failure() && !cancelled() }}
    uses: "./.github/workflows/code-coverage.yml"
    with:
      skip: ${{ needs.detect-changes.outputs.backend_any_modified != 'true' }}

  ui-component-tests:
    name: Test
    needs: [detect-changes, install-dist, install-browsers]
    if: ${{ !failure() && !cancelled() }}
    uses: "./.github/workflows/ui-component-tests.yml"
    with:
      skip: ${{ needs.detect-changes.outputs.ui_any_modified != 'true' }}

  ui-app-tests:
    name: Test
    needs: [detect-changes, install-dist, install-browsers]
    if: ${{ !failure() && !cancelled() }}
    uses: "./.github/workflows/ui-app-tests.yml"
    with:
      skip: ${{ needs.detect-changes.outputs.any_modified != 'true' }}

  build-manager-image:
    name: Build
    needs: [detect-changes, install-dist, unit-tests, integration-tests, ui-check-outdated-translations, ui-component-tests, ui-app-tests]
    if: ${{ !failure() && !cancelled() }}
    uses: "./.github/workflows/build-manager-image.yml"
    with:
      tags: ${{ needs.detect-changes.outputs.dockerTags }}
    secrets:
      DOCKERHUB_USER: ${{ secrets._TEMP_DOCKERHUB_USER }}
      DOCKERHUB_PASSWORD: ${{ secrets._TEMP_DOCKERHUB_PASSWORD }}

  # build-deployment-image: # TODO: enable when we have private registries for custom projects
  #   name: Build
  #   needs: [install-dist]
  #   uses: "./.github/workflows/build-deployment-image.yml"

  publish-maven:
    name: Publish
    needs: [detect-changes, install-dist, unit-tests, integration-tests, ui-check-outdated-translations, ui-component-tests, ui-app-tests]
    if: ${{ !failure() && !cancelled() }}
    uses: "./.github/workflows/publish-maven.yml"
    secrets:
      MAVEN_SIGNING_PASSWORD: ${{ secrets._TEMP_MAVEN_SIGNING_PASSWORD }}
      MAVEN_SIGNING_KEY: ${{ secrets._TEMP_MAVEN_SIGNING_KEY }}
      MAVEN_USERNAME: ${{ secrets._TEMP_MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets._TEMP_MAVEN_PASSWORD }}

  publish-npm:
    name: Publish
    needs: [detect-changes, install-dist, unit-tests, integration-tests, ui-check-outdated-translations, ui-component-tests, ui-app-tests]
    if: ${{ !failure() && !cancelled() }}
    uses: "./.github/workflows/publish-npm.yml"
    with:
      tag: ${{ needs.install-dist.outputs.npmTag }}
    secrets:
      NPM_AUTH_TOKEN: ${{ secrets._TEMP_NPM_AUTH_TOKEN }}

  deployment:
    name: Deploy
    needs: [detect-changes, unit-tests, integration-tests, ui-check-outdated-translations, ui-component-tests, ui-app-tests]
    if: ${{ !failure() && !cancelled() }}
    uses: "./.github/workflows/deployment.yml"
    with:
      INPUTS: ${{ toJSON(inputs) }}
    secrets: inherit
