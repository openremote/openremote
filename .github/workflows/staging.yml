  #   uses: "./.github/workflows/deployment.yml"

  deployment:
    name: Deploy
    needs: [unit-tests, integration-tests, ui-check-outdated-translations, ui-component-tests, ui-app-tests]
    # needs: [detect-changes, build-deployment-image, build-manager-image]
    if: needs.detect-changes.outputs.any_modified == 'true'
    uses: "./.github/workflows/deployment.yml"
    with:
      INPUTS: ${{ toJSON(inputs) }}
    secrets: inherit
