name: NPM publish dry run
on:
  workflow_call:
    inputs:
      skip:
        type: boolean
        description: Skip condition to allow branch protection checks to pass
        default: false

jobs:
  npm-dry-run:
    name: NPM publish dry run
    if: ${{ !inputs.skip }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: or-ui-component-build
          path: ui/component

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: or-ui-app-build
          path: ui/app

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: or-ui-util-build
          path: ui/util

      - name: Update when the `tsbuildinfo` files were last modified to 'now'
        run: find . -name "*.tsbuildinfo" -exec touch {} +
        # You can see how the TypeScript compiler invalidates the build artifacts by running:
        # - `npx tsc -b --verbose`: to see if the artifacts are up-to-date
        # - `find src | xargs touch`: to update component inputs
      - run: yarn --immutable

      - name: Run NPM publish dry run
        timeout-minutes: 20
        run: yarn workspaces foreach --all --no-private --topological npm publish --dry-run
