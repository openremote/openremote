name: NPM publish dry run
on: workflow_call

jobs:
  npm-dry-run:
    name: NPM publish dry run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: or-ui-component-build
          path: ui/component
      - name: Update when the `tsbuildinfo` files were last modified to 'now'
        run: find . -name "*.tsbuildinfo" -exec touch {} +
        # You can see how the TypeScript compiler invalidates the build artifacts by running:
        # - `npx tsc -b --verbose`: to see if the artifacts are up-to-date
        # - `find src | xargs touch`: to update component inputs
      - run: yarn --immutable
      - name: Run NPM publish dry run
        timeout-minutes: 20
        run: yarn workspaces foreach --all --no-private --topological npm publish --dry-run
