name: UI App Tests
on:
  workflow_call:
    inputs:
      skip:
        type: boolean
        description: Skip condition to allow branch protection checks to pass
        default: false

jobs:
  ui-app-tests:
    name: UI App Tests
    if: ${{ !inputs.skip }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardCount: [4]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true # Enable Git LFS plugin to fetch *.mbtiles
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: or-manager-build
          path: manager/build
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: or-ui-component-build
          path: ui/component
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: playwright-browsers
          path: /home/runner/.cache/ms-playwright
      - name: Make Playwright browser binaries executable
        run: chmod -R +x /home/runner/.cache/ms-playwright
      # - name: Install Playwright browsers dependencies
      #   run: npx playwright@$(jq -r ".devDependencies.playwright" ui/test/package.json) install-deps chromium-headless-shell
      - name: Set up JDK 21 and gradle cache
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"
      - name: Run UI App Tests
        timeout-minutes: 20
        run: |
          # Start the stack
          docker compose -f profile/dev-testing.yml up -d --no-build

          # Run the tests
          ./gradlew -p ui/app npmTest -Pargs="--shard=${{ matrix.shardIndex }}/${{ matrix.shardCount }}"
      - name: Archive UI app test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: or-ui-app-test-results-${{ matrix.shardIndex }}
          path: ui/app/*/app-test-report/**

  ui-app-tests-status:
    name: UI App Tests Status
    needs: ui-app-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix job result
        if: ${{ needs.ui-app-tests.result == 'failure' || needs.ui-app-tests.result == 'cancelled' }}
        run: exit 1
      - name: Success or Skipped
        if: ${{ needs.ui-app-tests.result == 'success' || needs.ui-app-tests.result == 'skipped' }}
        run: echo "UI App Tests completed successfully or were skipped."
