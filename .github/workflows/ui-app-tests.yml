name: UI App Tests
on: workflow_call

jobs:
  ui-app-tests:
    name: UI App Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardCount: [4]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true # Enable Git LFS plugin to fetch *.mbtiles
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: or-manager-build
          path: manager/build
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: or-ui-component-build
          path: ui/component
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: playwright-browsers
          path: /home/runner/.cache/ms-playwright
      - name: Make Playwright browser binaries executable
        run: chmod -R +x /home/runner/.cache/ms-playwright
      # - name: Install Playwright browsers dependencies
      #   run: npx playwright@$(jq -r ".devDependencies.playwright" ui/test/package.json) install-deps chromium-headless-shell
      - name: Set up JDK 21 and gradle cache
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"
      - name: Run UI App Tests
        timeout-minutes: 20
        run: |
          # Run UI App Tests
          # Make temp dir with 777 mask as docker seems to run as root
          mkdir -pm 777 tmp

          # Start the stack
          docker compose -f profile/dev-testing.yml up -d --no-build

          # Run the tests
          ./gradlew -p ui/app/manager npmTest -Pargs="--shard=${{ matrix.shardIndex }}/${{ matrix.shardCount }}"
      - name: Archive UI app test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: or-ui-app-test-results-${{ matrix.shardIndex }}
          path: ui/app/*/app-test-report/**
