name: Custom staging

on:
  workflow_dispatch:
    inputs:
      PUSH_SNAPSHOT:
        description: "Push snapshot Docker image to AWS ECR"
        type: boolean

jobs:
  detect-changes:
    name: Detect whether code changed
    runs-on: ubuntu-latest
    outputs: # See https://github.com/tj-actions/changed-files/tree/2bb135777322059ee3a3c9239999b159ff49febc#outputs-
      any_changed: ${{ steps.changed-files.outputs.backend_any_changed == 'true' || steps.changed-files.outputs.ui_any_changed == 'true' }}
      backend_any_changed: ${{ steps.changed-files.outputs.backend_any_changed }}
      ui_any_changed: ${{ steps.changed-files.outputs.ui_any_changed }}
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
        with:
          fetch-depth: 2 # Must be 2 for push events to compare to previous commit
      - name: Detect changes
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files_yaml: |
            ui:
              - 'ui/**'
              - '!**/*.md'
              - '!**/*.yml'
            backend:
              - '!.ci_cd/**'
              - '!deployment/**'
              - '!**/*.md'
              - '!**/*.yml'
              - '!yarn.lock'

  install-dist:
    name: Build
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'
    uses: "./.github/workflows/install-dist.yml"

  unit-tests:
    name: Test
    needs: detect-changes
    if: needs.detect-changes.outputs.backend_any_changed == 'true'
    uses: "./.github/workflows/unit-tests.yml"

  integration-tests:
    name: Test
    needs: detect-changes
    if: needs.detect-changes.outputs.backend_any_changed == 'true'
    uses: "./.github/workflows/integration-tests.yml"

  # deployment:
  #   name: Deploy
  #   needs: [unit-tests, integration-tests]
  #   uses: "./.github/workflows/deployment.yml"
