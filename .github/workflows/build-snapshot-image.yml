name: Build snapshot image

on:
  workflow_call:
    secrets:
      AWS_DEVELOPERS_ACCOUNT_ID:
        required: true
      AWS_ECR_PUSH_ROLE:
        required: true
    inputs:
      PUSH:
        type: boolean

permissions:
  id-token: write

jobs:
  snapshot-image:
    name: Snapshot image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: or-manager-build
          path: manager/build

      - name: Install QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: linux/amd64,linux/aarch64

      - name: Install Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Configure AWS Credentials
        if: ${{ inputs.PUSH }}
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-region: eu-west-1
          role-to-assume: "arn:aws:iam::${{ secrets.AWS_DEVELOPERS_ACCOUNT_ID }}:role/${{ secrets.AWS_ECR_PUSH_ROLE }}"

      - name: Login to private ECR
        if: ${{ inputs.PUSH }}
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5

      - name: Resolve snapshot image tag
        id: meta
        shell: bash
        run: |
          COMMIT_SHA_SHORT=$(git rev-parse --short HEAD)
          echo "shortSha=$COMMIT_SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Build snapshot image
        timeout-minutes: 20
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: manager/build/install/manager
          platforms: linux/amd64,linux/aarch64
          load: false
          push: ${{ inputs.PUSH }}
          tags: ${{ secrets.AWS_DEVELOPERS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/openremote/manager:${{ steps.meta.outputs.shortSha }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
