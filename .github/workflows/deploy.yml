# This workflow only exists to allow manual deployments e.g. to test servers.
#
# It leverages existing reusable workflows similar to the staging.yml environment workflow but unlike the staging.yml workflow
# it only includes the required jobs for deployments: install-dist, build-manager-image and deploy.
name: Deploy

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      ENVIRONMENT:
        description: 'Environment to use (if any)'
      MANAGER_TAG:
        description: 'Manager docker tag to pull'
      CLEAN_INSTALL:
        description: 'Delete data before starting'
        type: boolean
      COMMIT:
        description: 'Repo branch or commit SHA to checkout'
      OR_HOSTNAME:
        description: 'Host to deploy to (e.g. demo.openremote.app)'
      OR_ADMIN_PASSWORD:
        description: 'Admin password override'

  workflow_call:
    inputs:
      INPUTS:
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  is-main-repo:
    name: Is main repository
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.is_main_repo.outputs.value }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Check if main repo
        id: is_main_repo
        uses: openremote/openremote/.github/actions/check-if-main-repo@fa6f52032b1dea3d4ad080cc6436a3ef3843b0be

  install-dist:
    name: Build
    needs: is-main-repo
    if: ${{ needs.is-main-repo.outputs.value == 'true' }}
    uses: "./.github/workflows/install-dist.yml"

  deployment:
    name: Deployment
    needs: install-dist
    if: always() && !cancelled() && (needs.install-dist.result == 'success' || needs.install-dist.result == 'skipped')
    uses: "./.github/workflows/deployment.yml"
    with:
      INPUTS: ${{ toJSON(inputs) }}
    secrets: inherit
