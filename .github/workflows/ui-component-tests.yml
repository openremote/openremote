name: UI Component Tests
on: workflow_call

jobs:
  ui-component-tests:
    name: UI Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up JDK 21 and Gradle cache
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mdi-fonts
          path: ui/app/shared/fonts/Material Design Icons
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: or-ui-component-build
          path: ui/component
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: playwright-browsers
          path: /home/runner/.cache/ms-playwright
      - name: Make Playwright browser binaries executable
        run: chmod -R +x /home/runner/.cache/ms-playwright
      # - name: Install Playwright browsers dependencies
      #   run: npx playwright@$(jq -r ".devDependencies.playwright" ui/test/package.json) install-deps chromium-headless-shell
      - name: Update when the `tsbuildinfo` files were last modified to 'now'
        run: find . -name "*.tsbuildinfo" -exec touch {} +
      - name: Run UI component tests
        timeout-minutes: 20
        run: ./gradlew -p ui/component npmTest
      - name: Archive UI component test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: or-ui-component-test-results
          path: ui/component/*/component-test-report/**
