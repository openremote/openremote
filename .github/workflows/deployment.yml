name: Deployment
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      environment:
        description: Environment (.env) file to use.
        type: string
        required: false
      hostname:
        description: Instance to deploy to.
        type: string
        required: true
      password:
        description: Configure OR_ADMIN_PASSWORD or override .env value
        type: string
        required: false
      clean_install:
        description: Delete Docker volumes (manager / postgres data)
        type: boolean
        default: false

jobs:
  deployment:
    name: "Deployment"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: echo 'test'
