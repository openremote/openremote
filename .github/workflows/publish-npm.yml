name: NPM
on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
    secrets:
      NPM_AUTH_TOKEN:
        required: true

jobs:
  npm-publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: or-ui-component-build
          path: ui/component

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: or-ui-app-build
          path: ui/app

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: or-ui-util-build
          path: ui/util

      - name: Update when the `tsbuildinfo` files were last modified to 'now'
        run: find . -name "*.tsbuildinfo" -exec touch {} +

      - run: yarn --immutable

      - name: Publish to NPM
        run: |
          echo 'npmRegistries:' >> .yarnrc.yml
          echo '  "https://registry.yarnpkg.com":' >> .yarnrc.yml
          echo "    npmAuthToken: ${{ secrets.NPM_AUTH_TOKEN }}" >> .yarnrc.yml
          yarn workspaces foreach --all --no-private --topological npm publish --tag ${{ inputs.tag }}
