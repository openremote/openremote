name: Install Dist

on:
  workflow_call:
    outputs:
      build_version:
        description: "The version generated by the build"
        value: ${{ jobs.build-job.outputs.version }}
      is_success:
        description: "Whether the build succeeded"
        value: ${{ jobs.build-job.outputs.status }}

jobs:
  install-dist:
    name: Install Dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true # Enable Git LFS plugin to fetch *.mbtiles

      - name: Set up JDK 21 and Gradle cache
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Check ci_cd existence
        id: check_cicd_json
        uses: andstor/file-existence-action@558493d6c74bf472d87c84eab196434afc2fa029 # v3.1.0
        with:
          files: ".ci_cd/ci_cd.json"

      - name: Check if main repo
        id: is_main_repo
        uses: ./.github/actions/check-if-main-repo

      - name: Get version details
        id: get-version-details
        uses: ./.github/actions/get-version-details

      - name: Process ci_cd.json file
        if: ${{ steps.check_cicd_json.outputs.files_exists == 'true' && (github.ref_type == 'tag' || (github.event_name != 'workflow_dispatch' && github.event_name != 'pull_request')) }}
        id: ci-cd-output
        uses: ./.github/actions/process-cicd-json
        with:
          IS_MAIN_REPO: ${{ steps.is_main_repo.outputs.value }}
          MANAGER_VERSION: ${{ steps.is_main_repo.outputs.ref }}
          IS_RELEASE: ${{ steps.get-version-details.outputs.is_release }}
          VERSION: ${{ steps.get-version-details.outputs.version }}

      - name: Run Install Dist
        timeout-minutes: 20
        run: ./gradlew installDist

      - name: Archive manager build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: or-manager-build
          if-no-files-found: error
          path: |
            manager/build

      - name: Archive deployment build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: or-deployment-build
          if-no-files-found: error
          path: |
            deployment/build

      - name: Archive UI component build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: or-ui-component-build
          if-no-files-found: error
          path: |
            ui/component/model/src/model.ts
            ui/component/rest/src/restclient.ts
            ui/component/**/custom-elements.json
            ui/component/**/custom-elements-jsx.d.ts
            ui/component/**/dist
            ui/component/**/lib
            ui/component/**/tsconfig.tsbuildinfo

      - name: Archive MDI fonts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mdi-fonts
          if-no-files-found: error
          path: |
            ui/app/shared/fonts/Material Design Icons
