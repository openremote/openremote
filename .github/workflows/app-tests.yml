name: UI App Tests
on: workflow_call

jobs:

  ui-app-tests:
    name: UI App Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [ 1, 2, 3, 4 ]
        shardCount: [ 4 ]
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
        with:
          lfs: true # Enable Git LFS plugin to fetch *.mbtiles
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          name: or-manager-build
          path: manager/build
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          name: or-ui-component-build
          path: ui/component
      - name: Install Playwright browsers
        run: npx playwright@1.57.0 install --with-deps chromium
      - name: Set up JDK 21 and gradle cache
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      - name: Run UI App Tests
        timeout-minutes: 20
        run: |
          # Make temp dir with 777 mask as docker seems to run as root
          mkdir -pm 777 tmp

          # Start the stack
          docker compose -f profile/dev-testing.yml up -d --no-build

          # Run the tests
          ./gradlew -p ui/app/manager npmTest -Pargs="--shard=${{ matrix.shardIndex }}/${{ matrix.shardCount }}"
      - name: Archive UI app test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: or-ui-app-test-results-${{ matrix.shardIndex }}
          path: ui/app/*/app-test-report/**
