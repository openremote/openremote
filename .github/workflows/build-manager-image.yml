name: Build manager image

on:
  workflow_call:
    secrets:
      DOCKERHUB_USER:
        required: true
      DOCKERHUB_PASSWORD:
        required: true
    inputs:
      tag:
        type: string
        required: true
      dispatched:
        type: boolean
        default: false

jobs:
  build-manager-image:
    name: Manager image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # One run per architecture to allow 'type=docker' export
        arch: [amd64, aarch64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: or-manager-build
          path: manager/build

      - name: Install QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: linux/amd64,linux/aarch64

      - name: Install Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build manager image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: manager/build/install/manager
          platforms: linux/${{ matrix.arch }}
          tags: openremote/manager:${{ inputs.tag }}
          load: false
          push: false
          outputs: |
          # ${{ github.event.inputs.push_to_registry == 'true' && 'type=registry' || '' }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=manager-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=manager-${{ matrix.arch }}
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false

      - name: Scan manager docker image
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: manager-anchore-scan
        with:
          image: openremote/manager:${{ inputs.tag }}
          fail-build: false
          severity-cutoff: critical

      - name: Upload Anchore scan SARIF report
        uses: github/codeql-action/upload-sarif@b8bb9f28b8d3f992092362369c57161b755dea45 # v4.35.0
        with:
          sarif_file: ${{ steps.manager-anchore-scan.outputs.sarif }}
          category: grype-${{ matrix.arch }}

      - name: Inspect Anchore scan SARIF report
        run: cat ${{ steps.manager-anchore-scan.outputs.sarif }}
