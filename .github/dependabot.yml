version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "openremote/openremote"

  # Maintain npm/Yarn dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      vaadin:
        patterns:
          - "@vaadin/*"
      playwright:
        patterns:
          - "@playwright/*"
          - "@sand4rt/experimental-ct-web"
          - "playwright-core"
          - "playwright"
    cooldown: # Align with .yarnrc.yml npmMinimalAgeGate (1w) and npmPreapprovedPackages
      default-days: 7
      exclude:
        - "@openremote/*"
    rebase-strategy: disabled # Prevent unnecessary pipeline runs
    ignore:
      - dependency-name: "@material/*" # Material components are deprecated and no longer maintained
      - dependency-name: "@rsbuild/*"
      - dependency-name: "@rsdoctor/*"
      - dependency-name: "@rspack/*"

  # Maintain Java dependencies for the Gradle multi-project build.
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
    rebase-strategy: disabled # Prevent unnecessary pipeline runs
