name: Check if main repo
description: Resolves- and checks if it is run from the main repository, and resolves the OpenRemote version

outputs:
  value:
    description: Whether this is the main repository which builds the manager
    value: ${{ steps.is_main_repo.outputs.value }}
  repository:
    description: The main GitHub repository name
    value: ${{ steps.is_main_repo.outputs.repository }}
  version:
    description: The openremote version defined in the main repo
    value: ${{ steps.is_main_repo.outputs.version }}

runs:
  using: composite
  steps:
    - name: Check if main repo
      id: is_main_repo
      shell: bash
      run: |
        if [ -f manager/src/main/java/org/openremote/manager/Main.java ]; then
          echo "value=true" >> $GITHUB_OUTPUT
        else
          if [ -e 'openremote' ]; then
            echo "::error::openremote submodule no longer supported, see custom project template!"
            exit 1
          fi

          echo "value=false" >> $GITHUB_OUTPUT
          echo "repository=$(sed -E 's#(.+)/.+#\1/openremote#' <<< $GITHUB_REPOSITORY)" >> $GITHUB_OUTPUT

          version=$(cat gradle.properties | grep openremoteVersion | sed -E 's#.+=(.+)#\1#' | xargs)

          if [ -z "$version" ]; then
            echo "openremoteVersion must be set in gradle.properties"
            exit 1
          fi

          echo "version=$version" >> $GITHUB_OUTPUT
        fi
